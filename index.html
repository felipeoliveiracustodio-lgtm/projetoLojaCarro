<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Venda seu carro</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header class="cabecalho">
            <h3>Cadastre seu veículo para vender mais rápido</h3>
        </header>
        <div class="form-container">
            <div class="form-header">
                <p>Formulário</p>
            </div>
            <div class="form-body">
                <h1 class="form-titulo">Venda fácil seu carro</h1>
                <p>Descreva as características do seu carro e marque os opcionais que ele possui</p>
                <form>
                    <div class="caixaInputs">
                        <label for="title">Título do anúncio <span class="campo-obrigatorio">*</span></label>
                        <input type="text" name="title" id="title" class="block" placeholder="Digite um título" minlength="1" maxlength="30" required>
                    </div>

                    <div class="caixaInputs">
                        <label for="preco">Preço <span class="campo-obrigatorio">*</span></label>
                        <input type="number" name="preco" id="preco" class="block" placeholder="Digite o preço" required>
                    </div>

                    <div class="caixaInputs">
                        <label for="descricao">Descrição</label>
                        <textarea name="descricao" id="descricao" class="block" placeholder="Faça a descrição do seu veículo aqui"></textarea>
                    </div>

                    <div class="caixaInputs">
                        <label for="marca">Marca <span class="campo-obrigatorio">*</span></label>
                        <input type="text" name="marca" id="marca" class="block" placeholder="Digite a marca" required>
                    </div>

                    <div class="caixaInputs">
                        <label for="modelo">Modelo <span class="campo-obrigatorio">*</span></label>
                        <input type="text" name="modelo" id="modelo" class="block" placeholder="Digite o modelo" required>
                    </div>

                    <div class="caixaInputs">
                        <label for="kilometragem">Kilometragem <span class="campo-obrigatorio">*</span></label>
                        <input type="number" name="kilometragem" id="kilometragem" class="block" placeholder="Digite a kilometragem" required>
                    </div>

                    <div class="caixaInputs">
                        <label for="data-compra">Data de Compra <span class="campo-obrigatorio">*</span></label>
                        <input type="date" name="data-compra" id="data-compra" class="block" required>
                    </div>

                    <div class="caixaInputs">
                        <p>Tipo de Câmbio: <span class="campo-obrigatorio">*</span></p>
                        <input type="radio" name="marcha" id="manual">
                        <label for="manual">Manual</label>
                        <input type="radio" name="marcha" id="auto">
                        <label for="auto">Automático</label>
                    </div>

                    <div class= "caixaOpcional">
                        <p>Opcionais</p>
                          <ul class="listaOpcionais">
                            <li>
                                <input type="checkbox" name="opcional[]" id="airbag" value="airbag">
                                <label for="airbag">Airbag</label>
                            </li>
                            <li>
                                <input type="checkbox" name="opcional[]" id="alarme" value="alarme>
                                label for="alarme>Alarme</label>
                            </li>
                            <li>
                                <input type="checkbox" name="opcional[]" id="a" value="ar-condicionado">
                                <label for="ar-condicionado">Arcondicionado</label>
                            </li>
                            <li>
                                <input type="checkbox" name="opcional[]" id="Camera-re" value="Camera-re">
                                <label for="Camera-re">Camera de ré</label>
                            </li>
                        </ul>
                    </div>
                    <ul class="listaOpcionais">
                        <div class="caixaOpcional">
                            <li>
                                  <input type="checkbox" name="opcional[]" id="assistente-pista" value="assistente-pista">
                                    <label for="assistente-pista">Assistente de Pista</label>
                            </li>
                            <li>
                                <input type="checkbox" name="opcional[]" id="Smartphone" value="Smartphone">
                                    <label for="Smartphone">Smartphone</label>
                            </li>
                             <input type="checkbox" name="opcional[]" id="banco-coro" value="banco-coro">
                                    <label for="banco-coro">banco-de-couro</label>
                            </li>
                        </ul>
                        </div>
                        <div class="caixaInputs">
                            <p>Fotos do carro <apan class="campoObrigatorio">*</span></p>
                                <input type="file"> name="imagem" id="imagem" multiple accept="image/png, image/jpg" required>
                                </div>
                                <input type="submit" value="Enviar" class="btn-submi">
                </form>
            </div>
        </div>
    </div>
</body>
</html>
